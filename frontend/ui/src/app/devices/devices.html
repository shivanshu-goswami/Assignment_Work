<h2>Devices</h2>

<!--<button [routerLink]="['/devices/create']">Create Device</button>-->
<button routerLink="/devices/create">Create Device</button>

<table class="device-table">
  <thead>
  <tr>
    <th>Name</th>
    <th>Part</th>
    <th>Building</th>
    <th>Type</th>
    <th>Actions</th>
  </tr>
  </thead>

  <tbody>
  @for (device of devices; track $index) {
  <tr>
    <td>{{ device.name }}</td>
    <td>{{ device.partNumber }}</td>
    <td>{{ device.building }}</td>
    <td>{{ device.type }}</td>
    <td>
      <button (click)="viewDevice(device.id)">View</button>
      <button (click)="deleteDevice(device.id)">Delete</button>
    </td>
  </tr>
  }
  </tbody>
</table>
