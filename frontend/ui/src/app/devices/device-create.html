<div class="create-device">
<h2>Create Device</h2>
<!--we can also use reactive form inplace of this template driven form structure-->
<input [(ngModel)]="device.deviceName" placeholder="Device Name">
<input [(ngModel)]="device.partNumber" placeholder="Part Number">
<input [(ngModel)]="device.buildingName" placeholder="Building">
<input [(ngModel)]="device.deviceType" placeholder="Device Type">

<input type="number"
       [(ngModel)]="device.numberOfShelfPositions"
       min="1"
       placeholder="Number of Shelf Positions">

<button (click)="create()">Create</button>

</div>
